<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrea ❤️</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;

      /* Solo un escudo centrado */
      background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
        url('https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg');
      background-size: 250px;
      background-repeat: no-repeat;
      background-position: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px 32px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      position: relative;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
      color: #ff4f8b;
    }

    a {
      display: inline-block;
      text-decoration: none;
      font-size: 1.4rem;
      font-weight: bold;
      color: white;
      background: #ff4f8b;
      padding: 18px 30px;
      border-radius: 999px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 20px rgba(255, 79, 139, 0.3);
    }

    a:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 24px rgba(255, 79, 139, 0.4);
    }

    /* corazones */
    .heart {
      position: absolute;
      font-size: 20px;
      color: #ff4f8b;
      animation: float 6s infinite ease-in-out;
    }

    .heart:nth-child(1) { top: -10px; left: 10%; }
    .heart:nth-child(2) { top: -20px; right: 15%; }
    .heart:nth-child(3) { bottom: -15px; left: 20%; }
    .heart:nth-child(4) { bottom: -20px; right: 10%; }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* muchas rosas */
    .rose {
      position: absolute;
      font-size: 24px;
    }

    .rose.r1 { top: -15px; left: -15px; }
    .rose.r2 { top: -15px; right: -15px; }
    .rose.r3 { bottom: -15px; left: -15px; }
    .rose.r4 { bottom: -15px; right: -15px; }
    .rose.r5 { top: 50%; left: -30px; transform: translateY(-50%); }
    .rose.r6 { top: 50%; right: -30px; transform: translateY(-50%); }
    .rose.r7 { top: 10px; left: 50%; transform: translateX(-50%); }
    .rose.r8 { bottom: 10px; left: 50%; transform: translateX(-50%); }

  </style>
</head>

<body>
  <div class="card">

    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>
    <div class="heart">❤️</div>

    <div class="rose r1">🌹</div>
    <div class="rose r2">🌹</div>
    <div class="rose r3">🌹</div>
    <div class="rose r4">🌹</div>
    <div class="rose r5">🌹</div>
    <div class="rose r6">🌹</div>
    <div class="rose r7">🌹</div>
    <div class="rose r8">🌹</div>

    <h1>Andrea ocicona 💖</h1>

    <a href="https://open.spotify.com/intl-es/track/3yPKvKPHsGDrlOe2MqRC89?si=85b6593b49484100" target="_blank" rel="noopener noreferrer">
      Pulse aquí, te quiero
    </a>

  </div>
</body>
</html>
